version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-portal-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://ai-portal.skillaro.eu
    networks:
      - ai-chat-agents_default
      - ai-portal-network
    expose:
      - "3000"
    volumes:
      - ./prisma:/app/prisma
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: ai-portal-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-aiportal}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-aiportal}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ai-portal-network
    expose:
      - "5432"

networks:
  ai-chat-agents_default:
    external: true
  ai-portal-network:
    driver: bridge

volumes:
  postgres-data:
